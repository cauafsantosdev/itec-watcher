name: iTec Watcher

on:
  schedule:
    # Runs at 20:00 (UTC-3)
    - cron: '0 23 * * *' 
  workflow_dispatch:

jobs:
  check-vagas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Config Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Save alterations on JSON
        run: |
          git config user.name "iTec Watcher"
          git config user.email "actions@github.com"
          git add seen_opportunities.json
          # Only commits if there are changes
          git commit -m "Update: New opportunities detected [skip ci]" || exit 0
          git push

      - name: Clean up issues older than 30 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Calcula a data de 30 dias atrás
          DATE_LIMIT=$(date -d "30 days ago" +"%Y-%m-%d")
          
          echo "Buscando issues criadas antes de $DATE_LIMIT..."
          
          # Busca os números das issues abertas criadas antes da data limite
          OLD_ISSUES=$(gh issue list --state open --search "created:<$DATE_LIMIT" --json number --jq '.[].number')
          
          if [ -z "$OLD_ISSUES" ]; then
            echo "Nenhuma issue com mais de 30 dias encontrada."
          else
            for ISSUE in $OLD_ISSUES; do
              echo "Fechando issue #$ISSUE..."
              gh issue close $ISSUE \
                --reason "completed" \
                --comment "Esta issue foi fechada automaticamente pelo \`iTec Watcher\` por estar aberta há mais de 30 dias."
            done
          fi
